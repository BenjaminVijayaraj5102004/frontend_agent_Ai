<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic‑Tac‑Toe</title>
  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header class="site-header container">
    <h1 class="text-heading-1">Tic‑Tac‑Toe</h1>
    <!-- Theme toggle (light / dark / system) -->
    <div class="theme-toggle" role="radiogroup" aria-label="Theme selection">
      <button class="theme-toggle-option" data-theme="light" role="radio" aria-checked="false">☀️ Light</button>
      <button class="theme-toggle-option" data-theme="dark" role="radio" aria-checked="false">🌙 Dark</button>
      <button class="theme-toggle-option" data-theme="system" role="radio" aria-checked="true">💻 System</button>
    </div>
  </header>

  <main class="container mt-8">
    <section class="game">
      <div id="status" class="status mb-4" aria-live="polite">Player X's turn</div>
      <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board">
        <!-- 9 cells will be generated by JavaScript -->
      </div>
      <button class="btn btn--primary mt-4" id="resetBtn">Reset Game</button>
    </section>
  </main>

  <script src="js/theme-manager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
